// SPDX-License-Identifier: Apache-2.0
//
// Gateway <-> Rust Datanode wire protocol. DRAFT v0.1.
// See Phase 3 RFC: notetaker/Projects/Apache Ozone/S3 Gateway Rust/
//                  2026-05-30 Wire Protocol RFC DatanodeGatewayService.md

syntax = "proto3";

package org.apache.ozone.dn.v1;

// =============================================================
// Shared types
// =============================================================

message ContainerID {
  uint64 id = 1;
}

message BlockID {
  uint64 container_id = 1;
  uint64 local_id = 2;
  // EC replica index; 0 = non-EC single replica, 1..k = data slot,
  // k+1..k+p = parity slot (1-indexed per Ozone convention).
  uint32 replica_index = 3;
}

message ChunkInfo {
  string chunk_name = 1;
  uint64 offset = 2;
  uint64 len = 3;
  ChecksumData checksum_data = 4;
  // RESERVED / not yet produced or consumed. Intended for EC per-stripe
  // checksums (on replica-1 and the parity replicas, per Ozone convention) to
  // support stripe-granular verification/reconstruction. The current path
  // verifies whole shards via `checksum_data` and never sets or reads this.
  StripeChecksum stripe_checksum = 5;
}

message ChecksumData {
  ChecksumType type = 1;
  uint32 bytes_per_checksum = 2;
  repeated bytes checksums = 3;
}

message StripeChecksum {
  repeated bytes per_stripe_checksums = 1;
}

enum ChecksumType {
  CHECKSUM_TYPE_UNSPECIFIED = 0;
  CRC32 = 1;
  CRC32C = 2;
  SHA256 = 3;
  MD5 = 4;
  NONE = 5;
}

message BlockData {
  BlockID block_id = 1;
  repeated ChunkInfo chunks = 2;
  // Special metadata keys:
  //   "blockGroupLen" -- for EC blocks, the full block-group length
  //                       (across all D+P internal blocks).
  //                       Must match OzoneConsts.BLOCK_GROUP_LEN_KEY_IN_PUT_BLOCK.
  //   reserved for future:
  reserved "ec_total_size", "version";
  map<string, string> metadata = 3;
}

message ECReplicationConfig {
  uint32 data = 1;        // k
  uint32 parity = 2;      // p
  uint32 ec_chunk_size = 3;  // bytes
  string codec = 4;       // "RS"
}

message ContainerState {
  enum State {
    STATE_UNSPECIFIED = 0;
    OPEN = 1;
    CLOSING = 2;
    QUASI_CLOSED = 3;
    CLOSED = 4;
    UNHEALTHY = 5;
    DELETED = 6;
  }
  State state = 1;
}

// =============================================================
// Version handshake
// =============================================================

message VersionRequest {
  uint32 client_major = 1;
  uint32 client_minor = 2;
}

message VersionResponse {
  uint32 server_major = 1;
  uint32 server_minor = 2;
  string server_build = 3;
}

// =============================================================
// Container lifecycle
// =============================================================

message CreateContainerRequest {
  ContainerID container_id = 1;
  // For EC containers: configuration.
  ECReplicationConfig ec_config = 2;
  // Owner / lease id (issued by SCM)
  string lease_id = 3;
  string request_id = 4;
}

message CreateContainerResponse {
  ContainerState state = 1;
}

message CloseContainerRequest {
  ContainerID container_id = 1;
  string request_id = 2;
}

message CloseContainerResponse {
  ContainerState state = 1;
  uint64 used_bytes = 2;
  uint64 block_count = 3;
}

message DeleteContainerRequest {
  ContainerID container_id = 1;
  bool force = 2;
  string request_id = 3;
}

message DeleteContainerResponse {}

message GetContainerInfoRequest {
  ContainerID container_id = 1;
}

message GetContainerInfoResponse {
  ContainerID container_id = 1;
  ContainerState state = 2;
  uint64 used_bytes = 3;
  uint64 block_count = 4;
  ECReplicationConfig ec_config = 5;
}

// =============================================================
// Block operations
// =============================================================

message PutBlockRequest {
  BlockData block_data = 1;
  // RESERVED / not yet acted on. Intended to mark the stripe-trailing block so
  // the DN can record blockGroupLen for future stripe-checksum-based partial
  // reconstruction. The DN currently ignores this flag, and reads take the
  // block-group length from OM (`KeyLocation.length`), not from stored metadata.
  bool eof = 2;
  string request_id = 3;
}

message PutBlockResponse {
  uint64 bcsi_id = 1;  // Block Commit Sequence Id from the DN
}

message GetBlockRequest {
  BlockID block_id = 1;
}

message GetBlockResponse {
  BlockData block_data = 1;
}

message DeleteBlockRequest {
  BlockID block_id = 1;
  string request_id = 2;
}

message DeleteBlockResponse {}

message ListBlocksRequest {
  ContainerID container_id = 1;
  // Optional: start at this local_id (inclusive). 0 = beginning.
  uint64 start_local_id = 2;
  uint32 page_size = 3;
}

message ListBlocksResponse {
  repeated BlockData blocks = 1;
  // Set when there are more pages; client should resume with start_local_id = next_local_id.
  uint64 next_local_id = 2;
}

// =============================================================
// Chunk operations (data plane)
// =============================================================

message WriteChunkRequest {
  // Header is required on the FIRST message of the stream; subsequent
  // messages carry only payload.
  WriteChunkHeader header = 1;
  bytes payload = 2;
  // Per-message flag: set on the last message of the stream.
  bool last = 3;
}

message WriteChunkHeader {
  BlockID block_id = 1;
  ChunkInfo chunk_info = 2;
  string request_id = 3;
}

message WriteChunkResponse {
  uint64 bytes_written = 1;
}

message ReadChunkRequest {
  BlockID block_id = 1;
  ChunkInfo chunk_info = 2;
  // If true, server includes checksums in the response stream.
  bool verify = 3;
}

message ReadChunkResponse {
  bytes payload = 1;
  bool last = 2;
}

// =============================================================
// EC stripe-level operations (gateway-side fan-out helpers)
// =============================================================

message PutECStripeRequest {
  PutECStripeHeader header = 1;
  bytes payload = 2;
  bool last = 3;
}

message PutECStripeHeader {
  ContainerID container_id = 1;
  uint64 local_id = 2;       // logical block id within the container
  uint32 replica_index = 3;  // 1..D+P
  ECReplicationConfig ec_config = 4;
  ChunkInfo chunk_info = 5;
  // Duplicated to catch drift between gateway and DN's partial-stripe geometry.
  uint32 parity_cell_size = 6;
  string request_id = 7;
}

message PutECStripeResponse {
  uint64 bytes_written = 1;
}

message ReadECStripeRequest {
  ContainerID container_id = 1;
  uint64 local_id = 2;
  uint32 replica_index = 3;
  ChunkInfo chunk_info = 4;
}

message ReadECStripeResponse {
  bytes payload = 1;
  bool last = 2;
}

// =============================================================
// Service
// =============================================================

service DatanodeGatewayService {
  // Version handshake (no block-token required)
  rpc GetVersion(VersionRequest) returns (VersionResponse);

  // Container lifecycle
  rpc CreateContainer(CreateContainerRequest) returns (CreateContainerResponse);
  rpc CloseContainer(CloseContainerRequest) returns (CloseContainerResponse);
  rpc DeleteContainer(DeleteContainerRequest) returns (DeleteContainerResponse);
  rpc GetContainerInfo(GetContainerInfoRequest) returns (GetContainerInfoResponse);

  // Block operations
  rpc PutBlock(PutBlockRequest) returns (PutBlockResponse);
  rpc GetBlock(GetBlockRequest) returns (GetBlockResponse);
  rpc DeleteBlock(DeleteBlockRequest) returns (DeleteBlockResponse);
  rpc ListBlocks(ListBlocksRequest) returns (stream ListBlocksResponse);

  // Chunk data plane
  rpc WriteChunk(stream WriteChunkRequest) returns (WriteChunkResponse);
  rpc ReadChunk(ReadChunkRequest) returns (stream ReadChunkResponse);

  // EC stripe helpers (may be folded into PutBlock/PutChunk before v1 freeze; see RFC Open Questions)
  rpc PutECStripe(stream PutECStripeRequest) returns (PutECStripeResponse);
  rpc ReadECStripe(ReadECStripeRequest) returns (stream ReadECStripeResponse);
}
