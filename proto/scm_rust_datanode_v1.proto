//
// SCM <-> Rust Datanode gRPC service. DRAFT v0.1.
// Phase 2 SCM gRPC spec.

syntax = "proto3";

package org.apache.ozone.scm.dn.v1;

import "datanode_gateway_v1.proto";

// =============================================================
// Common
// =============================================================

message DatanodeID {
  string uuid = 1;
  string ip_address = 2;
  string host_name = 3;
  string version = 4;
  uint64 setup_time_ms = 5;
  // gRPC port of this DN's DatanodeGatewayService. A peer DN dials
  // `http://{ip_address}:{gateway_port}` to read surviving shards during EC
  // repair (mirrors org.apache.ozone.dn.v1.DatanodeDetails.gateway_port).
  uint32 gateway_port = 6;
}

message VolumeReport {
  string volume_name = 1;
  uint64 capacity_bytes = 2;
  uint64 used_bytes = 3;
  uint64 reserved_bytes = 4;
  string storage_type = 5;  // "DISK", "SSD", "RAM_DISK"
}

message NodeReport {
  repeated VolumeReport volumes = 1;
  uint32 layout_version = 2;
  string operational_state = 3;  // "IN_SERVICE", "DECOMMISSIONING", ...
}

message ContainerReport {
  org.apache.ozone.dn.v1.ContainerID container_id = 1;
  org.apache.ozone.dn.v1.ContainerState.State state = 2;
  uint64 used_bytes = 3;
  uint64 block_count = 4;
  uint64 bcsi_id = 5;
  uint32 replica_index = 6;  // 0 for non-EC
}

message PipelineReport {
  string pipeline_id = 1;
  bool leader = 2;
}

message CommandStatusReport {
  uint64 cmd_id = 1;
  enum Status {
    STATUS_UNSPECIFIED = 0;
    PENDING = 1;
    EXECUTED = 2;
    FAILED = 3;
  }
  Status status = 2;
  string detail = 3;
}

// =============================================================
// Handshake & registration
// =============================================================

message VersionRequest {
  uint32 client_major = 1;
  uint32 client_minor = 2;
}

message VersionResponse {
  uint32 server_major = 1;
  uint32 server_minor = 2;
  string cluster_id = 3;
}

message RegisterRequest {
  DatanodeID datanode_id = 1;
  NodeReport node_report = 2;
}

message RegisterResponse {
  string assigned_uuid = 1;  // SCM may rewrite the UUID on first registration
  uint32 heartbeat_interval_sec = 2;
}

// =============================================================
// Heartbeat (bidi)
// =============================================================

message HeartbeatRequest {
  string datanode_uuid = 1;
  NodeReport node_report = 2;
  repeated CommandStatusReport command_status = 3;
}

message HeartbeatResponse {
  repeated ScmCommand commands = 1;
}

// =============================================================
// Container report stream
// =============================================================

message ContainerReportRequest {
  string datanode_uuid = 1;
  enum Kind {
    KIND_UNSPECIFIED = 0;
    FULL = 1;
    INCREMENTAL = 2;
  }
  Kind kind = 2;
  repeated ContainerReport reports = 3;
}

message ContainerReportAck {
  uint64 acked_seq = 1;
}

// =============================================================
// SCM commands (server -> client)
// =============================================================

message ScmCommand {
  uint64 cmd_id = 100;
  uint64 term = 101;
  bytes encoded_token = 102;
  int64 deadline_ms = 103;

  oneof payload {
    CloseContainerCommand close_container = 1;
    DeleteContainerCommand delete_container = 2;
    ReplicateContainerCommand replicate_container = 3;
    ReconstructECContainersCommand reconstruct_ec_containers = 4;
    DeleteBlocksCommand delete_blocks = 5;
    SetNodeOperationalStateCommand set_node_operational_state = 6;
    RefreshVolumeUsageCommand refresh_volume_usage = 7;
    FinalizeNewLayoutVersionCommand finalize_layout = 8;
    ReconcileContainerCommand reconcile_container = 9;
    ReregisterCommand reregister = 10;
  }
}

message CloseContainerCommand {
  org.apache.ozone.dn.v1.ContainerID container_id = 1;
  bool force = 2;
}

message DeleteContainerCommand {
  org.apache.ozone.dn.v1.ContainerID container_id = 1;
  bool force = 2;
}

message ReplicateContainerCommand {
  org.apache.ozone.dn.v1.ContainerID container_id = 1;
  repeated DatanodeID sources = 2;
}

message ReconstructECContainersCommand {
  org.apache.ozone.dn.v1.ContainerID container_id = 1;
  repeated DatanodeID sources = 2;        // survivors to read shards from (need gateway_port)
  repeated DatanodeID targets = 3;        // receiving DN matches itself by uuid
  repeated uint32 missing_indexes = 4;    // EC slots (1..=k+p) to rebuild on the target
  org.apache.ozone.dn.v1.ECReplicationConfig ec_config = 5;
  // Peer uuid -> the EC slot (1..=k+p) it holds, so the target knows which
  // survivor is which (mirrors om Pipeline.member_replica_indexes).
  map<string, uint32> source_replica_indexes = 6;
  // The specific block groups within the container to rebuild. Each carries its
  // own block-group length (authoritative from SCM/OM), so the target needs no
  // metadata round-trip and partial-stripe sizing is exact.
  repeated ReconstructBlock blocks = 7;
}

message ReconstructBlock {
  uint64 local_id = 1;
  uint64 block_group_len = 2;  // user bytes; feeds the EC decoder's length
}

message DeleteBlocksCommand {
  message ContainerBlocks {
    org.apache.ozone.dn.v1.ContainerID container_id = 1;
    repeated uint64 local_ids = 2;
  }
  repeated ContainerBlocks container_blocks = 1;
}

message SetNodeOperationalStateCommand {
  string operational_state = 1;
  int64 op_state_expiry_ms = 2;
}

message RefreshVolumeUsageCommand {}

message FinalizeNewLayoutVersionCommand {
  uint32 layout_version = 1;
}

message ReconcileContainerCommand {
  org.apache.ozone.dn.v1.ContainerID container_id = 1;
  repeated DatanodeID peers = 2;
}

message ReregisterCommand {}

// =============================================================
// Service
// =============================================================

service ScmRustDatanodeService {
  rpc GetVersion(VersionRequest) returns (VersionResponse);
  rpc Register(RegisterRequest) returns (RegisterResponse);
  rpc Heartbeat(stream HeartbeatRequest) returns (stream HeartbeatResponse);
  rpc ContainerReport(stream ContainerReportRequest) returns (stream ContainerReportAck);
}
